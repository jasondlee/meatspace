quarkus.application.name=meatspace-backend
quarkus.http.port=8080
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.jdbc.url=${MEATSPACE_DB_URL:jdbc:postgresql://localhost:5432/meatspace}
#quarkus.datasource.username=${MEATSPACE_DB_USERNAME:meatspace}
#quarkus.datasource.password=${MEATSPACE_DB_PASSWORD:meatspace}
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.issuer=https://meatspace.local

quarkus.datasource.devservices.enabled=true

#%dev.quarkus.datasource.devservices.db-name=meatspace
#%dev.quarkus.datasource.devservices.username=meatspace
#%dev.devquarkus.datasource.devservices.password=meatspace
#%dev.quarkus.datasource.jdbc.url=
#%dev.quarkus.datasource.username=
#%dev.quarkus.datasource.password=

#%test.quarkus.datasource.db-kind=h2
#%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:meatspace;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
